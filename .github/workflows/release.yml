name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      DOCKER_IMAGE: nikyjain/whatomate
      DOCKER_CACHE_IMAGE: nikyjain/whatomate:buildcache
      GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/whatomate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch images
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          version_tag="${RELEASE_TAG#v}"
          docker buildx build \
            --builder "${{ steps.buildx.outputs.name }}" \
            --platform linux/amd64,linux/arm64 \
            -f docker/Dockerfile \
            --cache-from "type=registry,ref=${DOCKER_CACHE_IMAGE}" \
            --cache-to "type=registry,ref=${DOCKER_CACHE_IMAGE},mode=max,oci-mediatypes=true,image-manifest=true,compression=gzip" \
            -t "${DOCKER_IMAGE}:latest" \
            -t "${DOCKER_IMAGE}:${version_tag}" \
            -t "${GHCR_IMAGE}:latest" \
            -t "${GHCR_IMAGE}:${version_tag}" \
            --push .

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
