version: 2

before:
  hooks:
    - bash -c "cd frontend && npm ci"
    - bash -c "cd frontend && npm run build"
    - rm -rf internal/frontend/dist/assets internal/frontend/dist/*.html internal/frontend/dist/*.svg internal/frontend/dist/*.mp3
    - cp -r frontend/dist/. internal/frontend/dist/

builds:
  - id: whatomate
    main: ./cmd/whatomate
    binary: whatomate
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.BuildTime={{.Date}}

archives:
  - id: whatomate
    builds:
      - whatomate
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: shridarpatil
    name: whatomate
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
